<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TOURFLEX - Refund Requests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
        }

        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #0d6efd;
            color: white;
        }

        .complete-btn {
            background: #198754;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
        }

        .complete-btn:hover {
            background: #157347;
        }

        .done-text {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>All Refund Requests</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Booking ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Package</th>
        <th>Bank</th>
        <th>Account Holder</th>
        <th>Account Number</th>
        <th>Branch</th>
        <th>Note</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="r : ${refunds}">
        <td th:text="${r.id}"></td>
        <td th:text="${r.bookingId}"></td>
        <td th:text="${r.customerName}"></td>
        <td th:text="${r.customerEmail}"></td>
        <td th:text="${r.packageName}"></td>
        <td th:text="${r.bankName}"></td>
        <td th:text="${r.accountHolderName}"></td>
        <td th:text="${r.accountNumber}"></td>
        <td th:text="${r.branchName}"></td>
        <td th:text="${r.note}"></td>
        <td th:text="${r.refundStatus}"></td>
        <td>
            <span th:if="${r.refundStatus == 'Completed'}" class="done-text">Refund Done</span>

            <a th:if="${r.refundStatus != 'Completed'}"
               th:href="@{'/refund/complete/' + ${r.id}}"
               class="complete-btn"
               onclick="return confirm('Mark this refund as completed?');">
                Mark Completed
            </a>
        </td>
    </tr>
</table>

</body>
</html>
