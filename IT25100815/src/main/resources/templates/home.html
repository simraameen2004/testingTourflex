<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TOURFLEX - Home</title>
    <link rel="stylesheet" href="/css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, #0d6efd, #00c6ff);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            color: white;
            font-size: 26px;
            font-weight: bold;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 18px;
            font-weight: 500;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* HERO */
        .hero {
            height: 500px;
            background:
                    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .hero h1 {
            font-size: 56px;
        }

        .hero p {
            font-size: 20px;
        }

        .btn {
            background: #ffc107;
            padding: 12px 22px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: black;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffb300;
            transform: scale(1.05);
        }

        /* SECTION */
        .section {
            padding: 50px 20px;
            text-align: center;
        }

        .section h2 {
            font-size: 34px;
        }

        /* CARDS */
        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            margin-top: 30px;
        }

        .destination-card {
            background: white;
            width: 320px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            overflow: hidden;
            transition: 0.3s;
        }

        .destination-card:hover {
            transform: translateY(-8px);
        }

        .destination-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .destination-body {
            padding: 18px;
        }

        .destination-body h3 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        .destination-body p {
            font-size: 15px;
            color: #555;
        }

        .footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">TOURFLEX</div>
    <div>
        <a href="/">Home</a>
        <a href="/packages/list">Packages</a>
        <a href="/custom-package/create">Customize</a>
        <a href="/custom-package/my">My Custom Packages</a>
        <a href="/booking/my-bookings">My Bookings</a>
        <a href="/review/add-page">Reviews</a>
        <a href="/user/register-page">Register</a>
        <a href="/user/login-page">Login</a>
    </div>
</div>

<div class="hero">
    <div>
        <h1>Discover Sri Lanka</h1>
        <p>Plan your perfect tour with TOURFLEX</p>
        <a href="/packages/list" class="btn">Explore Packages</a>
    </div>
</div>

<div class="section">
    <h2>Popular Destinations</h2>

    <div class="cards" th:if="${popularPackages != null and !popularPackages.isEmpty()}">

        <div class="destination-card" th:each="pkg : ${popularPackages}">

            <img th:if="${pkg.imageName != null and !#strings.isEmpty(pkg.imageName)}"
                 th:src="@{'/images/' + ${pkg.imageName}}">

            <img th:if="${(pkg.imageName == null or #strings.isEmpty(pkg.imageName)) and pkg.location == 'Ella'}"
                 th:src="@{/images/ella.jpg}">

            <img th:if="${(pkg.imageName == null or #strings.isEmpty(pkg.imageName)) and pkg.location == 'Yala'}"
                 th:src="@{/images/yala.jpg}">

            <img th:if="${(pkg.imageName == null or #strings.isEmpty(pkg.imageName)) and pkg.location == 'Bentota'}"
                 th:src="@{/images/bentota.jpg}">

            <img th:if="${(pkg.imageName == null or #strings.isEmpty(pkg.imageName)) and pkg.location == 'Sigiriya'}"
                 th:src="@{/images/sigiriya.jpg}">

            <div class="destination-body">
                <h3 th:text="${pkg.location}"></h3>
                <p th:text="${pkg.description}"></p>
            </div>
        </div>

    </div>
</div>

<div class="footer">
    © 2026 TOURFLEX
</div>

</body>
</html>
